      .faq {
        max-width: 736px;
        margin: 0 auto 5rem;
        padding: 0 1.5rem;
      }

      /* 1つのQ&Aブロック */
      .accordion-item {
        border-bottom: 1px solid #ddd;
      }

      /* 質問ボタン */
      .accordion-question {
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        cursor: pointer;
        padding: 1.25rem 2.5rem 1.25rem 0;
        font-size: 1.1rem;
        font-family: inherit;
        color: #432;
        position: relative;
        line-height: 1.6;
      }

      /* 矢印アイコン */
      .accordion-question::after {
        content: "▼";
        position: absolute;
        right: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.75rem;
        color: #0bd;
        transition: transform 0.3s;
      }
      /* 開いたときに矢印を反転 */
      .accordion-question.is-open::after {
        transform: translateY(-50%) rotate(180deg);
      }

      /* 回答（初期状態：非表示） */
      .accordion-answer {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
      }

      /* 回答（開いた状態） */
      .accordion-answer.is-open {
        max-height: 300px;
      }
      .accordion-answer p {
        padding: 0 0.5rem 1.25rem;
        color: #666;
        line-height: 1.8;
      }

      /* Q / A ラベル */
      .label-q,
      .label-a {
        display: inline-block;
        font-family: "Philosopher", sans-serif;
        font-size: 1.1rem;
        font-weight: bold;
        margin-right: 0.5rem;
      }
      .label-q {
        color: #0bd;
      }
      .label-a {
        color: #432;
      }
    </style>
